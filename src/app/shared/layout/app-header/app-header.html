<header class="app-header">
  <div class="app-header__inner">
    <a
      class="brand"
      routerLink="/"
      aria-label="OrdinaMii - Vai alla home"
    >
      <span
        class="brand__mark"
        aria-hidden="true"
      >
        O
      </span>

      <span>OrdinaMii</span>
    </a>

    <nav
      class="navigation"
      aria-label="Navigazione principale"
    >
      <a
        routerLink="/"
        routerLinkActive="navigation__link--active"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        Home
      </a>

      <a
        routerLink="/menu"
        routerLinkActive="navigation__link--active"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        Menu
      </a>

      @if (!authenticated() || isCustomer()) {
        <a
          routerLink="/my-orders"
          routerLinkActive="navigation__link--active"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          Ordini
        </a>

        <a
          routerLink="/my-reservations"
          routerLinkActive="navigation__link--active"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          Prenotazioni
        </a>
      }

      @if (authenticated()) {
        <a
          routerLink="/profile"
          routerLinkActive="navigation__link--active"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          Profilo
        </a>
      }

      @if (isCustomer()) {
        <a
          routerLink="/assistance"
          routerLinkActive="navigation__link--active"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          Assistenza
        </a>

        <a
          class="cart-indicator"
          routerLink="/cart"
          routerLinkActive="navigation__link--active"
          data-cart-target
          aria-live="polite"
          [attr.aria-label]="
        'Carrello, ' +
        cartQuantity() +
        ' articoli'
      "
        >
          Carrello

          <span class="cart-indicator__badge">
        {{ cartQuantity() }}
      </span>
        </a>
      }

      @if (isStaff()) {
        <a
          routerLink="/staff"
          routerLinkActive="navigation__link--active"
        >
          Pannello staff
        </a>
      }
    </nav>

    <div class="session-actions">
      @if (authenticated()) {
        <span class="session-status">
          <span
            class="session-status__dot"
            aria-hidden="true"
          ></span>

          Connesso
        </span>

        <button
          class="
            session-button
            session-button--secondary
          "
          type="button"
          [disabled]="actionPending()"
          (click)="logout()"
        >
          {{
            actionPending()
              ? 'Attendi...'
              : 'Esci'
          }}
        </button>
      } @else {
        <button
          class="session-button session-button--secondary"
          type="button"
          [disabled]="actionPending()"
          (click)="register()"
        >
          Registrati
        </button>

        <button
          class="session-button session-button--primary"
          type="button"
          [disabled]="actionPending()"
          (click)="login()"
        >
          {{
            actionPending()
              ? 'Attendi...'
              : 'Accedi'
          }}
        </button>
      }
    </div>
  </div>
</header>
