<article class="dish-card">
  <div class="dish-card__image-stage">
    <span class="dish-card__category">
      {{ categoryLabel() }}
    </span>

    <div class="dish-card__image-container">
      @if (imageUrl(); as source) {
        <img
          class="dish-card__image"
          [src]="source"
          [alt]="dish().name"
          loading="lazy"
          (error)="markImageAsUnavailable()"
        />
      } @else {
        <div class="dish-card__placeholder">
          <span aria-hidden="true">○</span>
          <small>Nessuna immagine</small>
        </div>
      }
    </div>
  </div>

  <div class="dish-card__content">
    <h2 class="dish-card__name">
      {{ dish().name }}
    </h2>

    <p class="dish-card__description">
      {{
        dish().description ||
        'Descrizione non disponibile.'
      }}
    </p>

    <footer class="dish-card__footer">
      <div class="dish-card__price-group">
        <small>Prezzo</small>

        <strong class="dish-card__price">
          {{
            dish().price
              | currency: 'EUR' : 'symbol' : '1.2-2'
          }}
        </strong>
      </div>

      @if (!dish().available) {
        <span class="dish-card__unavailable">
          Esaurito
        </span>
      } @else if (orderingEnabled()) {
        <button
          class="dish-card__add-button"
          [class.dish-card__add-button--added]="
            addedFeedback()
          "
          type="button"
          [attr.aria-label]="
            addedFeedback()
              ? dish().name + ' aggiunto al carrello'
              : 'Aggiungi ' +
                dish().name +
                ' al carrello'
          "
          [title]="
            addedFeedback()
              ? 'Aggiunto'
              : 'Aggiungi al carrello'
          "
          (click)="requestAddToCart()"
        >
          <span aria-hidden="true">
            {{
              addedFeedback()
                ? '✓'
                : '+'
            }}
          </span>
        </button>
      }
    </footer>
  </div>
</article>
